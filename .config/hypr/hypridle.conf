general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# 1. Dim the screen after 10 minutes (600s)
listener {
    timeout = 600
    on-timeout = brightnessctl -s set 10         
    on-resume = brightnessctl -r                 
}

# 2. Lock the screen after 14 minutes (840s)
listener {
    timeout = 840
    on-timeout = loginctl lock-session
}

# 3. Turn off screen (DPMS) at 15 minutes (900s)
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 4. Actual System Suspend at 30 minutes (1800s)
# This saves the most battery by putting the Ryzen/NVIDIA into S3/Deep sleep
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}