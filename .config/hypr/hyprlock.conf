# --- HYPRLOCK MOCHA EDITION ---

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot
    color = rgba(30, 30, 46, 1.0)
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
}

# 1. THE CLOCK
label {
    monitor =
    text = $TIME
    color = rgb(203, 166, 247) # Mauve
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -100
    halign = center
    valign = top
}

# 2. THE DATE (Fills the gap)
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgb(205, 214, 244) # Text
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -310
    halign = center
    valign = top
}

# --- USER AVATAR ---
image {
    monitor =
    path = /home/rx/Avatar/avatar.jpg
    size = 220
    rounding = -1
    border_size = 4
    border_color = rgb(203, 166, 247)
    # Increased Y from 70 to 100 to add "margin" from the top elements
    position = 0, 50 
    halign = center
    valign = center
}

# --- GREETING ---
label {
    monitor =
    text = Hi there, Rui!
    color = rgb(205, 214, 244)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    # Decreased Y from -60 to -100 to add "margin" below the avatar
    position = 0, -120 
    halign = center
    valign = center
}

# 5. THE INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(203, 166, 247, 0.5)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    fade_on_empty = false
    placeholder_text = <span foreground="##cdd6f4">Password...</span>
    position = 0, -200
    halign = center
    valign = center
}

# 6. SYSTEM STATUS (Fills the bottom)
label {
    monitor =
    text = cmd[update:1000] echo -e "󰁹 $(cat /sys/class/power_supply/BAT0/capacity)% | $(date +"%H:%M")"
    color = rgba(205, 214, 244, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = bottom
}